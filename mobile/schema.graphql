type FollowRequestConnection {
  pageInfo: PageInfo!
  edges: [FollowRequestEdge]
}

enum RelationshipState {
  ACCEPTED
  BLOCKED
  NONE
  PUBLIC
  REQUESTED
}

enum FollowState {
  REQUESTED
  ACCEPTED
}

type SocialFollowPayload {
  id: ID!
  state: FollowState!
}

type FollowRequest implements Node {
  "The ID of an object"
  id: ID!

  state: FollowState!

  requestedAt: String!

  follower: User!
}

type LiveSessionConnection {
  pageInfo: PageInfo!
  edges: [LiveSessionEdge]
}

type PostConnection {
  pageInfo: PageInfo!
  edges: [PostEdge]
}

enum LiveSessionStatus {
  STARTING
  LIVE
  ENDED
}

enum LiveSessionVisibility {
  FOLLOWERS
  PUBLIC
}

enum LiveMediaIceServerCredentialType {
  OAUTH
  PASSWORD
}

type LiveMediaIceServer {
  urls: [String!]!
  username: String
  credential: String
  credentialType: LiveMediaIceServerCredentialType
}

type LiveSessionRecordingMediaAsset {
  id: ID!
  processingState: MediaProcessingState!
  publicUrl: String
}

type LiveSession implements Node {
  "The ID of an object"
  id: ID!

  status: LiveSessionStatus!

  visibility: LiveSessionVisibility!

  startedAt: String

  endedAt: String

  insertedAt: String!

  channelTopic: String

  host: User!

  recordingMediaAsset: LiveSessionRecordingMediaAsset

  timelineEvents(after: String, first: Int, before: String, last: Int): LiveSessionTimelineEventConnection
}

enum PostKind {
  STANDARD
  STORY
}

enum CreatePostKind {
  STANDARD
  STORY
}

enum PostVisibility {
  FOLLOWERS
  PUBLIC
}

enum MediaProcessingState {
  PENDING_UPLOAD
  UPLOADED
  PROCESSED
  FAILED
}

enum PostReportReason {
  SPAM
  HARASSMENT
  HATE
  VIOLENCE
  SEXUAL_CONTENT
  SELF_HARM
  ILLEGAL
  OTHER
}

enum PostReportStatus {
  OPEN
  REVIEWED
  DISMISSED
  ACTIONED
}

enum UploadHttpMethod {
  PUT
  POST
}

type PostReportConnection {
  pageInfo: PageInfo!
  edges: [PostReportEdge]
}

type SignedUploadHeader {
  name: String!
  value: String!
}

type SignedUpload {
  method: UploadHttpMethod!
  url: String!
  expiresAt: String!
  headers: [SignedUploadHeader!]!
}

type PostMediaAsset {
  id: ID!
  mimeType: String!
  processingState: MediaProcessingState!
  publicUrl: String
  insertedAt: String!
}

type Post implements Node {
  "The ID of an object"
  id: ID!

  kind: PostKind!

  bodyText: String

  visibility: PostVisibility!

  expiresAt: String

  insertedAt: String!

  author: User!

  mediaAssets: [PostMediaAsset!]!
}

type MediaAsset implements Node {
  "The ID of an object"
  id: ID!

  ownerId: ID!

  storageKey: String!

  mimeType: String!

  processingState: MediaProcessingState!

  publicUrl: String

  insertedAt: String!
}

type PostReport implements Node {
  "The ID of an object"
  id: ID!

  post: Post

  postId: ID!

  reporterId: ID!

  reason: PostReportReason!

  details: String

  status: PostReportStatus!

  decisionNote: String

  reviewedAt: String

  reviewedById: ID

  insertedAt: String!
}

type LiveSessionTimelineEventConnection {
  pageInfo: PageInfo!
  edges: [LiveSessionTimelineEventEdge]
}

enum LiveSessionTimelineEventType {
  CHAT_MESSAGE_SENT
  LIVE_SESSION_STARTED
  LIVE_SESSION_ENDED
}

interface LiveSessionTimelineEvent {
  id: ID!
  eventType: LiveSessionTimelineEventType!
  occurredAt: String!
  actor: User
}

type ChatMessageEvent implements LiveSessionTimelineEvent & Node {
  "The ID of an object"
  id: ID!

  eventType: LiveSessionTimelineEventType!

  occurredAt: String!

  actor: User

  body: String!

  edited: Boolean!

  editCount: Int!

  editedAt: String
}

type LiveSessionStartedEvent implements LiveSessionTimelineEvent & Node {
  "The ID of an object"
  id: ID!

  eventType: LiveSessionTimelineEventType!

  occurredAt: String!

  actor: User
}

type LiveSessionEndedEvent implements LiveSessionTimelineEvent & Node {
  "The ID of an object"
  id: ID!

  eventType: LiveSessionTimelineEventType!

  occurredAt: String!

  actor: User
}

type UserConnection {
  pageInfo: PageInfo!
  edges: [UserEdge]
}

type UserIdentityConnection {
  pageInfo: PageInfo!
  edges: [UserIdentityEdge]
}

type ContactMatchConnection {
  pageInfo: PageInfo!
  edges: [ContactMatchEdge]
}

type DataExportRequestConnection {
  pageInfo: PageInfo!
  edges: [DataExportRequestEdge]
}

type AccountDeletionRequestConnection {
  pageInfo: PageInfo!
  edges: [AccountDeletionRequestEdge]
}

"Supported auth providers for generic signup, login, and challenge flows."
enum AuthProvider {
  PASSWORD
  MAGIC_LINK
  GOOGLE
  APPLE
  PASSKEY
}

enum AuthChallengePurpose {
  SIGN_UP
  LOG_IN
}

"List of supported OAuth providers for logging in."
enum OauthProvider {
  "Sign in with Apple"
  APPLE

  "Sign in with Google"
  GOOGLE

  "Log in with Instagram (not currently supported)"
  INSTAGRAM

  "Log in with Facebook (not currently supported)"
  FACEBOOK

  "Log in with Twitter (not currently supported)"
  TWITTER
}

enum DataExportRequestStatus {
  PENDING
  PROCESSING
  COMPLETED
  FAILED
}

enum DataExportRequestFormat {
  JSON
}

enum AccountDeletionRequestStatus {
  PENDING
  SCHEDULED
  PROCESSING
  COMPLETED
  FAILED
  CANCELED
}

enum UserPrivacyMode {
  PRIVATE
  PUBLIC
}

type User implements Node {
  "The ID of an object"
  id: ID!

  email: String

  privacyMode: UserPrivacyMode!

  insertedAt: String!

  posts(after: String, first: Int!): PostConnection

  storyFeed(after: String, first: Int!): PostConnection

  currentLiveSession: LiveSession

  replayFeed(after: String, first: Int!): LiveSessionConnection

  userIdentities(after: String, first: Int!): UserIdentityConnection

  followers(after: String, first: Int!): UserConnection

  following(after: String, first: Int!): UserConnection
}

type UserIdentity implements Node {
  "The ID of an object"
  id: ID!

  provider: String!

  authProvider: AuthProvider

  oauthProvider: OauthProvider @deprecated(reason: "Use authProvider instead.")

  uid: String!

  canUnlink: Boolean!

  user: User!

  insertedAt: String!
}

type ContactMatch implements Node {
  "The ID of an object"
  id: ID!

  contactName: String

  birthday: String

  inviteRecipient: String

  matchedUsers: [User!]!
}

type DataExportRequest implements Node {
  "The ID of an object"
  id: ID!

  status: DataExportRequestStatus!

  format: DataExportRequestFormat!

  requestedAt: String!

  completedAt: String

  failureReason: String
}

type AccountDeletionRequest implements Node {
  "The ID of an object"
  id: ID!

  status: AccountDeletionRequestStatus!

  requestedAt: String!

  scheduledPurgeAt: String!

  completedAt: String

  failureReason: String
}

type Token {
  serializedValue: String!
  tokenVersion: Int!
  expiresAt: String
  insertedAt: String
  updatedAt: String
}

type AuthChallenge {
  provider: AuthProvider!
  purpose: AuthChallengePurpose!
  dispatched: Boolean!
  challengeToken: String
  payloadJson: String
}

input PasswordAuthInput {
  email: String
  password: String
  passwordConfirmation: String
}

input MagicLinkAuthInput {
  email: String
  token: String
}

input OauthAuthInput {
  idToken: String
}

input PasskeyAuthInput {
  email: String
  challengeToken: String
  credentialId: String
  clientDataJson: String
  authenticatorData: String
  signature: String
  attestationObject: String
  userHandle: String
}

input DeviceInfoInput {
  deviceUniqueId: String
  appVersion: String
  systemVersion: String
  carrier: String
  deviceMfg: String
  deviceModel: String
  deviceName: String
  systemName: String
  clientLaunchCount: Int
}

enum AuthErrorCode {
  UNAUTHENTICATED
  INVALID_INPUT
  INVALID_CREDENTIALS
  EMAIL_TAKEN
  TOKEN_EXPIRED
  TOKEN_REVOKED
  UNSUPPORTED_PROVIDER
  PROVIDER_VERIFICATION_FAILED
  PASSKEY_VERIFICATION_FAILED
}

type UserError {
  field: String
  message: String!
}

type AuthError {
  field: String
  code: AuthErrorCode!
  message: String!
}

type PageInfo {
  "When paginating backwards, are there more items?"
  hasPreviousPage: Boolean!

  "When paginating forwards, are there more items?"
  hasNextPage: Boolean!

  "When paginating backwards, the cursor to continue."
  startCursor: String

  "When paginating forwards, the cursor to continue."
  endCursor: String
}

type AccountDeletionRequestEdge {
  node: AccountDeletionRequest
  cursor: String
}

type DataExportRequestEdge {
  node: DataExportRequest
  cursor: String
}

type ContactMatchEdge {
  node: ContactMatch
  cursor: String
}

type UserIdentityEdge {
  node: UserIdentity
  cursor: String
}

type UserEdge {
  node: User
  cursor: String
}

type LiveSessionTimelineEventEdge {
  node: LiveSessionTimelineEvent
  cursor: String
}

type PostReportEdge {
  node: PostReport
  cursor: String
}

type PostEdge {
  node: Post
  cursor: String
}

type LiveSessionEdge {
  node: LiveSession
  cursor: String
}

type FollowRequestEdge {
  node: FollowRequest
  cursor: String
}
