schema {
  mutation: RootMutationType
  query: RootQueryType
}

type RootQueryType {
  viewer: User
  viewerDataExportRequests(after: String, first: Int!): DataExportRequestConnection
  viewerAccountDeletionRequests(after: String, first: Int!): AccountDeletionRequestConnection
  viewerContactMatches(after: String, first: Int!): ContactMatchConnection
  staffPostReports(after: String, first: Int!, status: PostReportStatus): PostReportConnection
  post(id: ID!): Post
  mediaAsset(id: ID!): MediaAsset
  homeFeed(after: String, first: Int!): PostConnection
  storyFeed(after: String, first: Int!): PostConnection
  liveNow(after: String, first: Int!): LiveSessionConnection
  replayFeed(after: String, first: Int!): LiveSessionConnection
  relationshipState(creatorId: ID!): RelationshipState!
  isMuted(creatorId: ID!): Boolean!
  viewerPendingFollowRequests(after: String, first: Int!): FollowRequestConnection
  node(
    "The ID of an object."
    id: ID!
  ): Node
}

interface Node {
  "The ID of the object."
  id: ID!
}

type RootMutationType {
  beginAuthChallenge(input: BeginAuthChallengeInput!): BeginAuthChallengePayload
  signUp(input: SignUpInput!): SignUpPayload
  logIn(input: LogInInput!): LogInPayload
  registerWithEmail(input: RegisterWithEmailInput!): RegisterWithEmailPayload
  attachUserPhoneNumber(input: AttachUserPhoneNumberInput!): AttachUserPhoneNumberPayload
  updateViewerPrivacyMode(input: UpdateViewerPrivacyModeInput!): UpdateViewerPrivacyModePayload
  requestPasswordReset(input: RequestPasswordResetInput!): RequestPasswordResetPayload
  resetPassword(input: ResetPasswordInput!): ResetPasswordPayload
  unlinkViewerIdentity(input: UnlinkViewerIdentityInput!): UnlinkViewerIdentityPayload
  requestViewerDataExport(input: RequestViewerDataExportInput!): RequestViewerDataExportPayload
  requestViewerAccountDeletion(input: RequestViewerAccountDeletionInput!): RequestViewerAccountDeletionPayload
  cancelViewerAccountDeletionRequest(input: CancelViewerAccountDeletionRequestInput!): CancelViewerAccountDeletionRequestPayload
  upsertViewerContactEntry(input: UpsertViewerContactEntryInput!): UpsertViewerContactEntryPayload
  deliverViewerContactInvite(input: DeliverViewerContactInviteInput!): DeliverViewerContactInvitePayload
  issueViewerAuthTokens(input: IssueViewerAuthTokensInput!): IssueViewerAuthTokensPayload
  refreshAuthTokens(input: RefreshAuthTokensInput!): RefreshAuthTokensPayload
  revokeRefreshToken(input: RevokeRefreshTokenInput!): RevokeRefreshTokenPayload
  editLiveChatMessage(input: EditLiveChatMessageInput!): EditLiveChatMessagePayload
  removeLiveChatMessageEvent(input: RemoveLiveChatMessageEventInput!): RemoveLiveChatMessageEventPayload
  createPost(input: CreatePostInput!): CreatePostPayload
  requestMediaUpload(input: RequestMediaUploadInput!): RequestMediaUploadPayload
  updatePost(input: UpdatePostInput!): UpdatePostPayload
  deletePost(input: DeletePostInput!): DeletePostPayload
  reportPost(input: ReportPostInput!): ReportPostPayload
  decidePostReport(input: DecidePostReportInput!): DecidePostReportPayload
  startLiveSession(input: StartLiveSessionInput!): StartLiveSessionPayload
  goLiveSession(input: GoLiveSessionInput!): GoLiveSessionPayload
  prepareLiveMediaSession(input: PrepareLiveMediaSessionInput!): PrepareLiveMediaSessionPayload
  joinLiveSession(input: JoinLiveSessionInput!): JoinLiveSessionPayload
  leaveLiveSession(input: LeaveLiveSessionInput!): LeaveLiveSessionPayload
  endLiveSession(input: EndLiveSessionInput!): EndLiveSessionPayload
  followUser(input: FollowUserInput!): FollowUserPayload
  acceptFollowRequest(input: AcceptFollowRequestInput!): AcceptFollowRequestPayload
  declineFollowRequest(input: DeclineFollowRequestInput!): DeclineFollowRequestPayload
  blockUser(input: BlockUserInput!): BlockUserPayload
  muteUser(input: MuteUserInput!): MuteUserPayload
  unmuteUser(input: UnmuteUserInput!): UnmuteUserPayload
}

